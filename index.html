<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Star Conflict Stats</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <h1>Star Conflict Stats</h1>

    <div class="controls">

        <input
            id="playerInput"
            list="players"
            placeholder="Add Player">

        <datalist id="players"></datalist>

        <button id="addPlayerBtn">
            Add Player
        </button>

        <div id="selectedPlayers"></div>

        <hr>

        <select id="statSelect">
            <option value="pvp.totalKill">
                PvP Kills
            </option>

            <option value="pvp.totalAssists">
                PvP Assists
            </option>

            <option value="pvp.totalDmgDone">
                PvP Damage
            </option>

            <option value="pvp.gamePlayed">
                PvP Games
            </option>
        </select>

        <button id="generateBtn">
            Generate Graph
        </button>

    </div>

    <canvas id="chart"></canvas>

    <script src="app.js"></script>

</body>
</html>
